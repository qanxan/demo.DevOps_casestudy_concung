# =============================================================================
# docker-compose.yml
# Dung de chay toan bo stack o local:
#   - jenkins        : Jenkins controller (custom image co docker-cli + kubectl)
#   - jenkins-agent  : agent chay build (ket noi controller qua JNLP)
#   - app            : demo application (Node.js)
#
# Chay:  docker compose up -d
# Jenkins UI:   http://localhost:8080
# App:          http://localhost:3000
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Jenkins controller
  # ---------------------------------------------------------------------------
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: casestudy/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web UI
      - "50000:50000" # cong ket noi cho inbound agent
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount docker socket de Jenkins co the build image (Docker-outside-of-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - ci

  # ---------------------------------------------------------------------------
  # Jenkins agent (inbound / JNLP)
  # AGENT_SECRET va node name lay tu Jenkins sau khi tao node "linux-agent".
  # Xem huong dan trong README (muc "Ket noi agent").
  # ---------------------------------------------------------------------------
  jenkins-agent:
    image: jenkins/inbound-agent:latest-jdk17
    container_name: jenkins-agent
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=linux-agent
      - JENKINS_SECRET=${AGENT_SECRET:-changeme}
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci

  # ---------------------------------------------------------------------------
  # Demo application (build tu ./app)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        APP_VERSION: "1.0.0-local"
    image: casestudy/demo-app:local
    container_name: demo-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - APP_ENV=local
      - APP_VERSION=1.0.0-local
    networks:
      - ci

volumes:
  jenkins_home:

networks:
  ci:
    driver: bridge
